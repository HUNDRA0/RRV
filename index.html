<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Viber Rankings — Den officiella tier-listan</title>
    <meta name="description" content="Den officiella Viber tier-listan. Se vem som rankas vart, kolla G Map, följ Making Moves och kommande events." />
    <meta name="theme-color" content="#6d3fe0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/og-image.svg" />
    <link rel="canonical" href="https://www.viberrankings.se/" />

    <!-- Open Graph (WhatsApp, iMessage, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.viberrankings.se/" />
    <meta property="og:site_name" content="Viber Rankings" />
    <meta property="og:title" content="Viber Rankings — Den officiella tier-listan" />
    <meta property="og:description" content="Den officiella Viber tier-listan. Se vem som rankas vart, kolla G Map, följ Making Moves och kommande events." />
    <meta property="og:image" content="https://www.viberrankings.se/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Viber Rankings — Den officiella tier-listan" />
    <meta property="og:locale" content="sv_SE" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Viber Rankings" />
    <meta name="twitter:description" content="Den officiella Viber tier-listan." />
    <meta name="twitter:image" content="https://www.viberrankings.se/og-image.svg" />

    <!-- Robots -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- Kickstart bootstrap fetch before JS loads — breaks the HTML→JS→fetch waterfall -->
    <script>window.__bootstrap=fetch('/api/bootstrap').then(function(r){return r.json()});</script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
